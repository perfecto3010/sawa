<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sawa | سوا</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #f8f9fa; --card-white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; transition: 0.5s; overflow: hidden; }
        
        /* Lobby */
        #lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; text-align: center; }
        .game-card { width: 90%; max-width: 400px; padding: 25px; margin: 10px; border-radius: 20px; color: white; font-size: 1.5rem; font-weight: bold; cursor: pointer; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        .game-card:active { transform: scale(0.95); }

        /* Game Screen */
        #game-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; box-sizing: border-box; }
        #turn-label { margin-bottom: 10px; font-size: 1.2rem; font-weight: bold; background: rgba(255,255,255,0.3); padding: 5px 15px; border-radius: 15px; }
        #display-card { background: white; padding: 35px 25px; border-radius: 25px; width: 85%; max-width: 350px; min-height: 200px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: bold; border: 8px solid #333; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); line-height: 1.4; }

        /* Rules Overlay */
        #rules-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        
        /* Timer UI */
        #timer-box { display: none; margin-bottom: 20px; flex-direction: column; align-items: center; }
        #time-circle { width: 60px; height: 60px; border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }

        button.main-btn { padding: 18px 60px; font-size: 1.3rem; border-radius: 50px; border: none; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .back-btn { margin-top: 30px; background: none; border: 1px solid #fff; color: #fff; padding: 8px 20px; border-radius: 10px; cursor: pointer; opacity: 0.7; }
        /* طبقة الحماية السوداء */
    #auth-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #1a1a1a; /* لون غامق يخفي كل شيء */
        z-index: 9999; /* فوق كل العناصر */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        text-align: center;
    }
    #auth-overlay img { width: 80px; margin-bottom: 20px; }
    
    </style>
</head>
<body>
    <div id="auth-overlay">
        <img src="https://cdn-icons-png.flaticon.com/512/833/833472.png" alt="Sawa Logo">
        <h2>Sawa | سوا</h2>
        <p>مساحة خاصة جداً</p>
        <button onclick="checkAuth()" style="padding: 10px 25px; border-radius: 20px; border: none; background: #ff85a2; color: white; font-weight: bold;">دخول</button>
    </div>
    <div id="lobby">
        <h1 style="font-size: 2.5rem; color: #333;">Sawa سوا ❤️</h1>
        <p style="margin-bottom: 30px; color: #666;">اختر لعبتنا الليلة</p>
        <div id="game-list"></div>
    </div>

    <div id="rules-screen">
        <h2 id="rules-title">قواعد اللعبة</h2>
        <p id="rules-text" style="font-size: 1.3rem; line-height: 1.6;"></p>
        <button class="main-btn" style="background: white; color: black;" onclick="closeRules()">ابدأ الآن 🚀</button>
    </div>

    <div id="game-screen">
        <div id="turn-label"></div>
        <div id="display-card">جاهز؟</div>
        
        <div id="timer-box">
            <div id="time-circle">60</div>
            <button id="timer-btn" onclick="startTimer()" style="background:#4caf50; color:white; border:none; padding:8px 20px; border-radius:10px;">ابدأ المؤقت ⏱️</button>
        </div>

        <button class="main-btn" id="draw-btn" onclick="drawCard()">سحب كارت</button>
        <button class="back-btn" onclick="location.reload()">العودة للقائمة الرئيسية 🔄</button>
        <div id="progress" style="margin-top:15px; font-size:0.9rem; font-weight:bold;"></div>
    </div>

    <script src="gamesData.js"></script>
    <script>
        let currentGame = null;
        let usedIndices = [];
        let isWifeTurn = Math.random() < 0.5;
        let timerInterval;

        // إنشاء قائمة الألعاب في اللوبي
        const gameList = document.getElementById('game-list');
        Object.values(allGames).forEach(game => {
            const btn = document.createElement('button');
            btn.className = 'game-card';
            btn.style.backgroundColor = game.accent;
            btn.innerText = game.title;
            btn.onclick = () => initGame(game.id);
            gameList.appendChild(btn);
        });

        function initGame(gameId) {
            currentGame = allGames[gameId];
            usedIndices = [];
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.body.style.backgroundColor = currentGame.color;
            document.getElementById('display-card').style.borderColor = currentGame.accent;
            document.getElementById('draw-btn').style.backgroundColor = currentGame.accent;
            
            // إظهار القواعد
            document.getElementById('rules-title').innerText = currentGame.title;
            document.getElementById('rules-text').innerText = currentGame.rules;
            document.getElementById('rules-screen').style.display = 'flex';
        }

        function closeRules() {
            document.getElementById('rules-screen').style.display = 'none';
        }

        function drawCard() {
            resetTimer();
            if (usedIndices.length === currentGame.questions.length) {
                alert("خلصنا اللعبة دي! اختار لعبة تانية.");
                location.reload();
                return;
            }

            let idx;
            do { idx = Math.floor(Math.random() * currentGame.questions.length); } 
            while (usedIndices.includes(idx));

            usedIndices.push(idx);
            const q = currentGame.questions[idx];
            document.getElementById('display-card').innerText = q;

            // Timer Logic
            if (q.includes("(مؤقت)") && currentGame.timerDuration > 0) {
                document.getElementById('timer-box').style.display = 'flex';
                document.getElementById('time-circle').innerText = currentGame.timerDuration;
            } else {
                document.getElementById('timer-box').style.display = 'none';
            }

            isWifeTurn = !isWifeTurn;
            document.getElementById('turn-label').innerText = isWifeTurn ? "دور الزوجة 🌸" : "دور الزوج 💙";
            document.getElementById('progress').innerText = `كارت ${usedIndices.length} من ${currentGame.questions.length}`;
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function startTimer() {
            let timeLeft = currentGame.timerDuration;
            document.getElementById('timer-btn').style.display = 'none';
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time-circle').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("انتهى الوقت! ⏱️");
                    document.getElementById('timer-btn').style.display = 'block';
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerInterval);
            document.getElementById('timer-btn').style.display = 'block';
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function checkAuth() {
            const CORRECT_PASSWORD = "3042023"; 
            
            const password = prompt("من فضلك أدخل كلمة السر للدخول:");
        
            if (password === CORRECT_PASSWORD) {
                // لو صح، نخفي الـ Overlay ونسمح بالدخول
                document.getElementById('auth-overlay').style.display = 'none';
                sessionStorage.setItem('isAuthorized', 'true');
            } else if (password !== null) {
                alert("كلمة سر خاطئة! حاول مرة أخرى.");
            }
        }
        
        // التأكد من حالة الدخول عند تحميل الصفحة
        window.onload = function() {
            if (sessionStorage.getItem('isAuthorized') === 'true') {
                document.getElementById('auth-overlay').style.display = 'none';
            }
        };
    </script>
</body>
</html>
