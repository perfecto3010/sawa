<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sawa | سوا ❤️</title>
    
    <style>
        :root { 
            --bg: #f8f9fa; 
            --wife-color: #ff85a2;
            --husband-color: #4a90e2;
            --neutral-dark: #1a1a1a;
            --dos-gold: #ffc107;
            --dos-text: #541010;
            --hint-color: #006060; /* لون الملحوظة الجديد - أغمق ومريح للعين */
            --hint-bg: rgba(0, 128, 128, 0.1);
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; background: var(--bg); 
            display: flex; flex-direction: column; 
            height: 100dvh; transition: background-color 0.8s ease; 
            overflow: hidden; touch-action: manipulation;
        }

        /* --- UI Elements --- */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .screen { display: none; flex-direction: column; align-items: center; justify-content: space-between; height: 100%; width: 100vw; padding: 15px; box-sizing: border-box; position: absolute; }
        #lobby { background-color: #0f0f0f; display: flex; justify-content: center; }

        .game-card { width: 90%; max-width: 400px; padding: 25px; margin: 10px; border-radius: 20px; color: white; font-size: 1.5rem; font-weight: bold; cursor: pointer; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        
        .header-area { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 5px 0; }
        .exit-btn { background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4); color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* --- Score Board --- */
        #score-board { display: none; justify-content: center; gap: 10px; flex-grow: 1; }
        .score-box { flex: 1; max-width: 100px; padding: 8px; border-radius: 12px; color: white; font-weight: bold; text-align: center; border: 2px solid #fff; }
        .score-val { font-size: 1.2rem; display: block; }

        /* --- Main Card Display --- */
        #display-card { 
            background: white; padding: 25px; border-radius: 25px; 
            width: 85%; max-width: 350px; flex-grow: 1; 
            max-height: 80dvh; margin: 20px 0;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            font-size: 1.3rem; font-weight: bold; border: 8px solid #333; 
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            line-height: 1.5; transition: 0.4s; position: relative;
            overflow-y: auto;
        }

        #card-hint { 
            width: 100%; font-size: 0.85rem; color: var(--hint-color); 
            background: var(--hint-bg); padding: 8px; border-radius: 8px;
            margin-bottom: 15px; font-weight: bold; border-right: 4px solid var(--hint-color);
            display: none; box-sizing: border-box;
        }

        #position-image { width: 100%; max-height: 250px; object-fit: contain; border-radius: 15px; margin-bottom: 15px; display: none; }

        /* --- Buttons & Controls --- */
        .controls-area { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 10px; }
        .btn-group { display: none; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; }
        .action-btn { padding: 16px; border-radius: 15px; border: none; color: white; font-weight: bold; cursor: pointer; }
        .main-btn { padding: 18px 60px; font-size: 1.3rem; border-radius: 50px; border: none; color: white; cursor: pointer; font-weight: bold; width: 100%; }
        .next-btn { background: #333; color: white; padding: 15px 50px; border-radius: 30px; border: none; font-weight: bold; display: none; }

        #timer-display { display: none; background: #f44336; color: white; width: 50px; height: 50px; border-radius: 50%; line-height: 50px; font-size: 1.2rem; font-weight: 900; margin-bottom: 10px; border: 2px solid #fff; }

        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h2>Sawa | سوا ❤️</h2>
        <button onclick="checkAuth()" class="main-btn" style="background:var(--wife-color); max-width: 250px;">دخول</button>
    </div>

    <div id="lobby" class="screen">
        <h1 style="color: white;">اختر لعبة الليلة <span onclick="pickRandomGame()" style="cursor:pointer">🎲</span></h1>
        <div id="game-list" style="width: 100%; display: flex; flex-direction: column; align-items: center; overflow-y: auto;"></div>
    </div>

    <div id="rules-screen" class="screen">
        <div style="flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%;">
            <div class="fade-in" style="background:white; padding:30px; border-radius:30px; text-align:center; width:85%; max-width:400px;">
                <h2 id="rules-title"></h2>
                <p id="rules-text"></p>
                <button class="main-btn" id="confirm-rules-btn" onclick="startActualGame()">يلا بينا! 🚀</button>
                <button onclick="location.reload()" style="background:none; border:none; color:#888; text-decoration: underline; margin-top:15px;">رجوع</button>
            </div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="header-area">
            <div style="width: 35px;"></div> 
            <div id="score-board">
                <div id="w-box" class="score-box" style="background:var(--wife-color)">الزوجة <span id="w-score" class="score-val">0</span></div>
                <div id="h-box" class="score-box" style="background:var(--husband-color)">الزوج <span id="h-score" class="score-val">0</span></div>
            </div>
            <button class="exit-btn" onclick="location.reload()">✕</button>
        </div>

        <div id="display-card" class="fade-in">
            <div id="timer-display">60</div>
            <div id="card-hint"></div>
            <img id="position-image" src="">
            <div id="text-container">البداية..</div>
        </div>

        <div id="level-selection" class="btn-group fade-in" style="display: none;">
            <button class="action-btn" style="background:#4caf50" onclick="selectLevel('level1')">هادي 😊</button>
            <button class="action-btn" style="background:#ff9800" onclick="selectLevel('level2')">متوسط 😉</button>
            <button class="action-btn" style="background:#f44336" onclick="selectLevel('level3')">نار 🔥</button>
        </div>

        <div class="controls-area">
            <div id="challenge-group" class="btn-group">
                <p id="challenge-txt" style="color:white; text-align:center; font-weight:bold;"></p>
                <div style="display:flex; gap:10px; width:100%;">
                    <button id="btn-wife" class="action-btn" style="background:var(--wife-color); flex:1;" onclick="applyCard('wife')"></button>
                    <button id="btn-husband" class="action-btn" style="background:var(--husband-color); flex:1;" onclick="applyCard('husband')"></button>
                </div>
            </div>

            <div id="scoring-group" class="btn-group">
                <button class="action-btn" style="background:#4caf50" onclick="confirmPoint(1)">جاوب صح (+1) ✅</button>
                <button class="action-btn" style="background:#f44336" onclick="confirmPoint(-2)">انسحب (-2) ❌</button>
            </div>

            <button id="next-btn" class="next-btn fade-in" onclick="resetToChallenge()">التالي ⮕</button>
            <div id="progress" style="color:white; font-size:0.8rem; opacity:0.7;"></div>
        </div>
    </div>

    <script src="gamesData.js"></script>
    <script>
        let currentGame = null;
        let usedIndices = [];
        let scores = { wife: 0, husband: 0 };
        let activePlayer = null;
        let currentLevel = null;
        let nextTurn = 'wife';
        let timerInterval = null;

        // Initialize Lobby
        window.onload = () => {
            if(sessionStorage.getItem('isAuthorized') === 'true') document.getElementById('auth-overlay').style.display = 'none';
            
            if(typeof allGames !== 'undefined') {
                const list = document.getElementById('game-list');
                Object.values(allGames).forEach(game => {
                    const btn = document.createElement('button');
                    btn.className = 'game-card';
                    btn.style.backgroundColor = game.accent;
                    btn.innerText = game.title;
                    btn.onclick = () => showRules(game);
                    list.appendChild(btn);
                });
            }
        };

        function showRules(game) {
            currentGame = game;
            document.body.style.backgroundColor = game.color;
            document.getElementById('rules-title').innerText = game.title;
            document.getElementById('rules-text').innerText = game.rules;
            document.getElementById('confirm-rules-btn').style.backgroundColor = game.accent;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('rules-screen').style.display = 'flex';
        }

        function startActualGame() {
            document.getElementById('rules-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            usedIndices = []; scores = { wife: 0, husband: 0 }; currentLevel = null; nextTurn = 'wife';
            updateScoreUI();
            resetToChallenge();
        }

        function resetToChallenge() {
            clearInterval(timerInterval);
            const card = document.getElementById('display-card');
            const hint = document.getElementById('card-hint');
            
            card.classList.remove('dos-mode');
            card.style.borderColor = "#333";
            hint.style.display = 'none';
            document.getElementById('timer-display').style.display = 'none';
            document.getElementById('scoring-group').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('position-image').style.display = 'none';
            
            if (currentGame.isMultiLevel && !currentLevel) {
                document.getElementById('text-container').innerText = "اختر درجة الحرارة 🔥";
                document.getElementById('challenge-group').style.display = 'none';
                document.getElementById('level-selection').style.display = 'flex';
                return;
            }

            document.getElementById('level-selection').style.display = 'none';
            document.getElementById('challenge-group').style.display = 'flex';
            document.body.style.backgroundColor = "var(--neutral-dark)";

            setupChallengeButtons();
        }

        function setupChallengeButtons() {
            const btnW = document.getElementById('btn-wife');
            const btnH = document.getElementById('btn-husband');
            const txt = document.getElementById('challenge-txt');
            const mainTxt = document.getElementById('text-container');

            btnW.style.display = 'block';
            btnH.style.display = 'block';

            if (currentGame.id === 'positions_game') {
                txt.innerText = "جاهزين للتغيير؟";
                mainTxt.innerText = "دوس وشوف حظكم في وضع إيه النهاردة! 🎲";
                btnW.innerText = "اختار لنا وضع 🎲";
                btnH.style.display = 'none';
                document.getElementById('score-board').style.display = 'none';
            } 
            else if (currentGame.id === 'lehalibo') {
                mainTxt.innerText = "👀 تحدي نظرات.. مين هيضحك؟";
                txt.innerHTML = "اللي يضحك الأول هو اللي يتسأل<br>مين اللي ضحك؟";
                btnW.innerText = "الزوجة 😂";
                btnH.innerText = "الزوج 😂";
                document.getElementById('score-board').style.display = 'flex';
            }
            else if (currentGame.id === 'heat_meter' || currentGame.id === 'shawk_aw_dawk') {
                txt.innerText = "الدور الآن على:";
                btnW.style.display = (nextTurn === 'wife') ? 'block' : 'none';
                btnH.style.display = (nextTurn === 'husband') ? 'block' : 'none';
                btnW.innerText = "الزوجة 🌸"; btnH.innerText = "الزوج 💙";
                mainTxt.innerText = (nextTurn === 'wife') ? "سؤال للزوجة.. 🌸" : "سؤال للزوج.. 💙";
                document.getElementById('score-board').style.display = 'none';
            }
            else { // Boss or Dos
                txt.innerText = "مين اللي كسب في حجر ورقة مقص؟";
                mainTxt.innerText = "✌️ حجر ورقة مقص..";
                btnW.innerText = "الزوجة 🌸"; btnH.innerText = "الزوج 💙";
                document.getElementById('score-board').style.display = 'flex';
            }
        }

        function applyCard(player) {
            activePlayer = player;
            if (currentGame.id === 'boss_dos' && scores[player] >= 6) { triggerDos(player); return; }

            const pool = currentGame.isMultiLevel ? currentGame.levels[currentLevel] : (currentGame.questions || currentGame.dosQuestions);
            
            if (usedIndices.length === pool.length) {
                alert("انتهت الكروت!"); resetToChallenge(); return;
            }

            let idx;
            do { idx = Math.floor(Math.random() * pool.length); } while (usedIndices.includes(idx));
            usedIndices.push(idx);

            displayQuestion(pool[idx], player);
            
            document.getElementById('progress').innerText = `كارت ${usedIndices.length} من ${pool.length}`;
            if (navigator.vibrate) navigator.vibrate(40);
        }

        function displayQuestion(data, player) {
            const hint = document.getElementById('card-hint');
            const img = document.getElementById('position-image');
            const txt = document.getElementById('text-container');
            
            hint.style.display = 'block';
            if (currentGame.id === 'lehalibo') {
                hint.innerText = (player === 'wife') ? "⚠️ الزوجة ضحكت! السؤال موجه للزوجة الآن:" : "⚠️ الزوج ضحك! السؤال موجه للزوج الآن:";
            } else if (currentGame.id === 'boss_dos') {
                hint.innerText = (player === 'wife') ? "🏆 الزوجة كسبت التحدي! اقرئي ونفذي:" : "🏆 الزوج كسب التحدي! اقرأ ونفذ:";
            } else {
                hint.style.display = 'none';
            }

            if (currentGame.id === 'positions_game') {
                txt.innerText = data.text;
                img.src = data.img;
                img.style.display = 'block';
            } else {
                txt.innerText = (typeof data === 'string') ? data : data.text;
                img.style.display = 'none';
            }

            // Handling Timer
            const hasTimer = txt.innerText.match(/\d+/) && (txt.innerText.includes("ثانية") || txt.innerText.includes("مدة"));
            if (hasTimer) {
                document.getElementById('timer-display').style.display = 'block';
                startTimer(parseInt(hasTimer[0]));
            }

            document.body.style.backgroundColor = (player === 'wife') ? "var(--wife-color)" : "var(--husband-color)";
            document.getElementById('challenge-group').style.display = 'none';
            
            if (currentGame.hasScore) {
                document.getElementById('scoring-group').style.display = 'flex';
            } else {
                if (currentGame.id === 'boss_dos') { scores[player]++; updateScoreUI(); }
                document.getElementById('next-btn').style.display = 'block';
            }

            if (['heat_meter', 'shawk_aw_dawk'].includes(currentGame.id)) nextTurn = (player === 'wife') ? 'husband' : 'wife';
        }

        function startTimer(sec) {
            let left = sec;
            const disp = document.getElementById('timer-display');
            disp.innerText = left;
            timerInterval = setInterval(() => {
                left--; disp.innerText = left;
                if (left <= 0) { clearInterval(timerInterval); disp.innerText = "⏰"; }
            }, 1000);
        }

        function triggerDos(player) {
            scores[player] -= 6; updateScoreUI();
            const dos = currentGame.dosQuestions[Math.floor(Math.random() * currentGame.dosQuestions.length)];
            document.body.style.backgroundColor = "var(--dos-gold)";
            document.getElementById('display-card').classList.add('dos-mode');
            document.getElementById('text-container').innerHTML = `<div style="font-size:0.9rem; margin-bottom:10px;">🔥 تحدي دوس إجباري 🔥</div>${dos}`;
            document.getElementById('challenge-group').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
        }

        function confirmPoint(pts) { scores[activePlayer] += pts; updateScoreUI(); resetToChallenge(); }
        function updateScoreUI() { document.getElementById('w-score').innerText = scores.wife; document.getElementById('h-score').innerText = scores.husband; }
        function checkAuth() { if (prompt("كلمة السر:") === "3042023") { document.getElementById('auth-overlay').style.display = 'none'; sessionStorage.setItem('isAuthorized', 'true'); } }
        function pickRandomGame() { const cards = document.querySelectorAll('.game-card'); if (cards.length) cards[Math.floor(Math.random()*cards.length)].click(); }
    </script>
</body>
</html>
