<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sawa | سوا</title>
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root { 
            --bg: #f8f9fa; 
            --wife-color: #ff85a2;
            --husband-color: #4a90e2;
            --neutral-dark: #1a1a1a;
            --dos-gold: #ffc107;
            --dos-text: #541010;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; transition: 0.5s; overflow: hidden; }
        
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }

        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; padding: 20px; box-sizing: border-box; position: absolute; }
        #lobby { display: flex; }

        .game-card { width: 90%; max-width: 400px; padding: 25px; margin: 10px; border-radius: 20px; color: white; font-size: 1.5rem; font-weight: bold; cursor: pointer; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        #score-board { display: none; justify-content: center; gap: 15px; margin-bottom: 20px; width: 100%; }
        .score-box { flex: 1; max-width: 120px; padding: 10px; border-radius: 15px; color: white; font-weight: bold; text-align: center; border: 2px solid #fff; transition: 0.3s; }
        .score-val { font-size: 1.5rem; display: block; }

        #display-card { background: white; padding: 35px 25px; border-radius: 25px; width: 85%; max-width: 350px; min-height: 200px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: bold; border: 8px solid #333; margin-bottom: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); line-height: 1.5; transition: 0.4s; }

        /* ستايل كارت دوس المطور */
        #display-card.dos-mode { 
            background: linear-gradient(45deg, #ffc107, #ffeb3b); 
            border: 8px solid #ff9800;
            color: var(--dos-text);
            box-shadow: 0 0 30px #ff9800;
            transform: scale(1.05);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px #ff9800; }
            50% { box-shadow: 0 0 40px #ff5722; }
            100% { box-shadow: 0 0 20px #ff9800; }
        }

        .btn-group { display: none; flex-direction: column; gap: 12px; width: 100%; max-width: 300px; }
        .action-btn { padding: 18px; border-radius: 15px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s; }
        .action-btn:active { transform: scale(0.95); }
        
        .main-btn { padding: 18px 60px; font-size: 1.3rem; border-radius: 50px; border: none; color: white; cursor: pointer; font-weight: bold; width: 100%; max-width: 250px; }
        
        .next-btn { background: #333; color: white; padding: 15px 50px; border-radius: 30px; border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h2>Sawa | سوا ❤️</h2>
        <button onclick="checkAuth()" style="padding:15px 40px; border-radius:25px; border:none; background:var(--wife-color); color:white; font-weight:bold;">دخول</button>
    </div>

    <div id="lobby" class="screen">
        <h1 style="margin-bottom: 30px;">اختر عالمنا الليلة</h1>
        <div id="game-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    </div>

    <div id="rules-screen" class="screen">
        <div style="background:white; padding:35px; border-radius:30px; text-align:center; width:85%; max-width:400px;">
            <h2 id="rules-title"></h2>
            <p id="rules-text" style="font-size:1.1rem; color:#444; margin:20px 0; line-height:1.6;"></p>
            <button class="main-btn" id="confirm-rules-btn" onclick="startActualGame()">يلا بينا! 🚀</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="score-board">
            <div id="w-box" class="score-box" style="background:var(--wife-color)">الزوجة <span id="w-score" class="score-val">0</span></div>
            <div id="h-box" class="score-box" style="background:var(--husband-color)">الزوج <span id="h-score" class="score-val">0</span></div>
        </div>

        <div id="display-card" class="fade-in">العبوا حجر ورقة مقص!</div>

        <div id="challenge-group" class="btn-group">
            <p id="challenge-instruction" style="color:white; text-align:center; font-weight:bold;">مين اللي كسب في التحدي؟</p>
            <button class="action-btn" style="background:var(--wife-color)" onclick="applyCard('wife')">الزوجة</button>
            <button class="action-btn" style="background:var(--husband-color)" onclick="applyCard('husband')">الزوج</button>
        </div>

        <div id="scoring-group" class="btn-group">
            <button class="action-btn" style="background:#4caf50" onclick="confirmPoint(1)">جاوب صح (+1) ✅</button>
            <button class="action-btn" style="background:#f44336" onclick="confirmPoint(-2)">انسحب (-2) ❌</button>
        </div>

        <button id="next-btn" class="next-btn" onclick="resetToChallenge()">التالي ⮕</button>

        <button onclick="location.reload()" style="background:none; border:1px solid rgba(255,255,255,0.5); color:white; margin-top:30px; padding:8px 20px; border-radius:12px; font-size:0.8rem;">رجوع للقائمة 🔄</button>
        <div id="progress" style="margin-top:15px; color:white; font-size:0.9rem; font-weight:bold;"></div>
    </div>

    <script src="gamesData.js"></script>
    <script>
        let currentGame = null;
        let usedIndices = [];
        let scores = { wife: 0, husband: 0 };
        let activePlayer = null;
        let isDosActive = false;

        const gameList = document.getElementById('game-list');
        Object.values(allGames).forEach(game => {
            const btn = document.createElement('button');
            btn.className = 'game-card';
            btn.style.backgroundColor = game.accent;
            btn.innerText = game.title;
            btn.onclick = () => {
                currentGame = game;
                document.body.style.backgroundColor = game.color;
                document.getElementById('rules-title').innerText = game.title;
                document.getElementById('rules-text').innerText = game.rules;
                document.getElementById('confirm-rules-btn').style.backgroundColor = game.accent;
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('rules-screen').style.display = 'flex';
            };
            gameList.appendChild(btn);
        });

        function startActualGame() {
            document.getElementById('rules-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            usedIndices = [];
            scores = { wife: 0, husband: 0 };
            updateScoreUI();
            resetToChallenge();
        }

        function resetToChallenge() {
            isDosActive = false;
            document.getElementById('display-card').classList.remove('dos-mode');
            document.getElementById('scoring-group').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('challenge-group').style.display = 'flex';
            document.body.style.backgroundColor = "var(--neutral-dark)";
            
            if (currentGame.id === 'lehalibo') {
                document.getElementById('display-card').innerText = "👀 تحدي نظرات.. مين هيضحك؟";
                document.getElementById('score-board').style.display = 'flex';
            } else {
                document.getElementById('display-card').innerText = "✌️✊✋ حجر ورقة مقص.. مين اللي كسب؟";
                document.getElementById('score-board').style.display = (currentGame.id === 'boss_dos') ? 'flex' : 'none';
            }
        }

        function applyCard(player) {
            // التحقق أولاً إذا كان الشخص وصل لـ 6 بوسات (إجبار كارت دوس)
            if (currentGame.id === 'boss_dos' && scores[player] >= 6) {
                triggerDos(player);
                return;
            }

            if (usedIndices.length === currentGame.questions.length) {
                alert("انتهت الكروت!"); location.reload(); return;
            }

            let idx;
            do { idx = Math.floor(Math.random() * currentGame.questions.length); } while (usedIndices.includes(idx));
            usedIndices.push(idx);
            
            activePlayer = player;
            document.getElementById('display-card').innerText = currentGame.questions[idx];
            document.body.style.backgroundColor = player === 'wife' ? "var(--wife-color)" : "var(--husband-color)";
            document.getElementById('challenge-group').style.display = 'none';

            if (currentGame.hasScore) {
                document.getElementById('scoring-group').style.display = 'flex';
            } else {
                if (currentGame.id === 'boss_dos') {
                    scores[player]++;
                    updateScoreUI();
                    // لو بعد الإضافة وصل لـ 6، هنطلّع كارت دوس في السحبة الجاية
                }
                document.getElementById('next-btn').style.display = 'block';
            }
            document.getElementById('progress').innerText = `كارت ${usedIndices.length} من ${currentGame.questions.length}`;
        }

        // دالة تشغيل كارت دوس الإجباري
        function triggerDos(player) {
            isDosActive = true;
            activePlayer = player;
            scores[player] -= 6; // خصم النقاط فوراً
            updateScoreUI();

            const dosList = currentGame.dosQuestions || ["تحدي دوس عشوائي!"];
            const randomDos = dosList[Math.floor(Math.random() * dosList.length)];

            document.body.style.backgroundColor = "var(--dos-gold)";
            const card = document.getElementById('display-card');
            card.classList.add('dos-mode');
            card.innerHTML = `${randomDos}`;            
            document.getElementById('challenge-group').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
        }

        function confirmPoint(pts) {
            scores[activePlayer] += pts;
            updateScoreUI();
            resetToChallenge();
        }

        function updateScoreUI() {
            document.getElementById('w-score').innerText = scores.wife;
            document.getElementById('h-score').innerText = scores.husband;
            
            // تأثير بصري لو حد وصل لـ 6
            document.getElementById('w-box').style.border = scores.wife >= 6 ? "4px solid gold" : "2px solid #fff";
            document.getElementById('h-box').style.border = scores.husband >= 6 ? "4px solid gold" : "2px solid #fff";
        }

        function checkAuth() {
            if (prompt("كلمة السر:") === "3042023") {
                document.getElementById('auth-overlay').style.display = 'none';
                sessionStorage.setItem('isAuthorized', 'true');
            }
        }
        window.onload = () => { if(sessionStorage.getItem('isAuthorized') === 'true') document.getElementById('auth-overlay').style.display = 'none'; };
    </script>
</body>
</html>
