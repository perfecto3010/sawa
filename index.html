<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sawa | سوا</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --bg: #f8f9fa; 
            --card-white: #ffffff;
            --wife-color: #ff85a2;
            --husband-color: #4a90e2;
            --neutral-dark: #343a40;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; transition: background-color 0.8s ease; overflow: hidden; }
        
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        #auth-overlay img { width: 80px; margin-bottom: 20px; }

        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; padding: 20px; box-sizing: border-box; position: absolute; top: 0; left: 0; }
        #lobby { display: flex; }

        .game-card { width: 90%; max-width: 400px; padding: 25px; margin: 10px; border-radius: 20px; color: white; font-size: 1.5rem; font-weight: bold; cursor: pointer; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        .game-card:active { transform: scale(0.95); }

        #rules-screen { background: rgba(0,0,0,0.05); z-index: 100; }
        .rules-container { background: white; padding: 40px 25px; border-radius: 30px; width: 85%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        #rules-text { font-size: 1.1rem; line-height: 1.6; color: #444; margin: 25px 0; }

        #score-board { display: none; justify-content: center; gap: 15px; margin-bottom: 20px; width: 100%; }
        .score-box { flex: 1; max-width: 120px; padding: 10px; border-radius: 15px; color: white; font-weight: bold; text-align: center; border: 2px solid #fff; transition: 0.3s; }
        .score-val { font-size: 1.5rem; display: block; }

        #turn-label { margin-bottom: 10px; font-size: 1.1rem; font-weight: bold; background: rgba(255,255,255,0.3); padding: 5px 15px; border-radius: 15px; text-align: center; min-height: 1.5rem; }
        #display-card { background: white; padding: 35px 25px; border-radius: 25px; width: 85%; max-width: 350px; min-height: 180px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; border: 8px solid #333; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); line-height: 1.4; text-align: center; transition: 0.3s; }

        #score-btns { display: none; flex-direction: column; gap: 8px; margin-bottom: 20px; width: 100%; max-width: 350px; text-align: center; }
        .score-row { display: flex; gap: 10px; width: 100%; }
        .point-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        
        #timer-box { display: none; margin-bottom: 20px; flex-direction: column; align-items: center; }
        #time-circle { width: 50px; height: 50px; border-radius: 50%; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-bottom: 8px; }
        
        button.main-btn { padding: 16px 50px; font-size: 1.2rem; border-radius: 50px; border: none; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); width: 100%; max-width: 250px; }
        .back-btn { margin-top: 15px; background: none; border: 1px solid rgba(255,255,255,0.8); color: white; padding: 8px 20px; border-radius: 10px; cursor: pointer; opacity: 0.8; }
        
        .fade-in { animation: fadeIn 0.4s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <img src="https://cdn-icons-png.flaticon.com/512/833/833472.png" alt="Sawa Logo">
        <h2>Sawa | سوا</h2>
        <button onclick="checkAuth()" style="padding: 12px 35px; border-radius: 25px; border: none; background: var(--wife-color); color: white; font-weight: bold; cursor: pointer;">دخول</button>
    </div>

    <div id="lobby" class="screen fade-in">
        <h1 style="font-size: 2.2rem; color: #333; margin: 0;">Sawa سوا ❤️</h1>
        <p style="margin-bottom: 25px; color: #666;">اختر عالمنا الليلة</p>
        <div id="game-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    </div>

    <div id="rules-screen" class="screen fade-in">
        <div class="rules-container">
            <h2 id="rules-title" style="margin-top: 0;"></h2>
            <div id="rules-text"></div>
            <button class="main-btn" id="confirm-rules-btn" onclick="startActualGame()">جاهزين.. نبدأ! 🚀</button>
            <div style="margin-top: 15px;"><a href="#" onclick="location.reload()" style="color: #888; text-decoration: none; font-size: 0.8rem;">رجوع للرئيسية</a></div>
        </div>
    </div>

    <div id="game-screen" class="screen fade-in">
        <div id="score-board">
            <div class="score-box" style="background: var(--wife-color);">الزوجة <span id="w-score" class="score-val">0</span></div>
            <div class="score-box" style="background: var(--husband-color);">الزوج <span id="h-score" class="score-val">0</span></div>
        </div>

        <div id="turn-label"></div>
        <div id="display-card">جاهز؟</div>

        <div id="score-btns">
            <p style="color:white; margin: 0 0 5px 0; font-size: 0.9rem;">مين اللي ضحك الأول؟</p>
            <div class="score-row">
                <button class="point-btn" style="background:var(--wife-color)" onclick="updatePoints(1, 'wife')">الزوجة (+1)</button>
                <button class="point-btn" style="background:var(--husband-color)" onclick="updatePoints(1, 'husband')">الزوج (+1)</button>
            </div>
            <div class="score-row">
                <button class="point-btn" style="background:var(--wife-color)" onclick="updatePoints(-2, 'wife')">انسحاب (-2)</button>
                <button class="point-btn" style="background:var(--husband-color)" onclick="updatePoints(-2, 'husband')">انسحاب (-2)</button>
            </div>
        </div>
        
        <div id="timer-box">
            <div id="time-circle">60</div>
            <button id="timer-btn" onclick="startTimer()" style="background:#4caf50; color:white; border:none; padding:8px 20px; border-radius:10px; cursor: pointer;">ابدأ المؤقت ⏱️</button>
        </div>

        <button class="main-btn" id="draw-btn" onclick="drawCard()">سحب كارت</button>
        <button class="back-btn" onclick="location.reload()">إنهاء اللعبة 🔄</button>
        <div id="progress" style="margin-top:12px; font-size:0.8rem; font-weight:bold; color: white;"></div>
    </div>

    <script src="gamesData.js"></script>
    <script>
        let currentGame = null;
        let usedIndices = [];
        let isWifeTurn = Math.random() < 0.5;
        let timerInterval;
        let scores = { wife: 0, husband: 0 };

        const gameList = document.getElementById('game-list');
        Object.values(allGames).forEach(game => {
            const btn = document.createElement('button');
            btn.className = 'game-card';
            btn.style.backgroundColor = game.accent;
            btn.innerText = game.title;
            btn.onclick = () => showRules(game.id);
            gameList.appendChild(btn);
        });

        function showRules(gameId) {
            currentGame = allGames[gameId];
            usedIndices = [];
            scores = { wife: 0, husband: 0 };
            document.getElementById('w-score').innerText = "0";
            document.getElementById('h-score').innerText = "0";
            document.body.style.backgroundColor = currentGame.color;
            document.getElementById('rules-title').innerText = currentGame.title;
            document.getElementById('rules-title').style.color = currentGame.accent;
            document.getElementById('rules-text').innerText = currentGame.rules;
            document.getElementById('confirm-rules-btn').style.backgroundColor = currentGame.accent;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('rules-screen').style.display = 'flex';
        }

        function startActualGame() {
            document.getElementById('rules-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('score-board').style.display = currentGame.hasScore ? 'flex' : 'none';
            document.getElementById('score-btns').style.display = 'none';
            document.getElementById('draw-btn').style.backgroundColor = currentGame.accent;
            document.getElementById('display-card').style.borderColor = currentGame.accent;
            document.getElementById('display-card').innerText = "جاهزين؟";
            document.getElementById('turn-label').innerText = "اضغط لسحب أول كارت";
            document.getElementById('progress').innerText = `كارت 0 من ${currentGame.questions.length}`;
        }

        function drawCard() {
            resetTimer();
            if (usedIndices.length === currentGame.questions.length) {
                alert("خلصنا الكروت!");
                location.reload();
                return;
            }

            let idx;
            do { idx = Math.floor(Math.random() * currentGame.questions.length); } 
            while (usedIndices.includes(idx));

            usedIndices.push(idx);
            const q = currentGame.questions[idx];
            document.getElementById('display-card').innerText = q;

            if (currentGame.hasScore) {
                document.body.style.backgroundColor = "var(--neutral-dark)";
                document.getElementById('turn-label').innerText = "👀 تحدي نظرات.. مين هيضحك؟";
                document.getElementById('score-btns').style.display = 'flex';
            } else {
                isWifeTurn = !isWifeTurn;
                document.body.style.backgroundColor = isWifeTurn ? "var(--wife-color)" : "var(--husband-color)";
                document.getElementById('turn-label').innerText = isWifeTurn ? "دور الزوجة 🌸" : "دور الزوج 💙";
                document.getElementById('score-btns').style.display = 'none';
            }

            if (q.includes("(مؤقت)") && currentGame.timerDuration > 0) {
                document.getElementById('timer-box').style.display = 'flex';
                document.getElementById('time-circle').innerText = currentGame.timerDuration;
            } else {
                document.getElementById('timer-box').style.display = 'none';
            }
            document.getElementById('progress').innerText = `كارت ${usedIndices.length} من ${currentGame.questions.length}`;
        }

        function updatePoints(pts, player) {
            if (player === 'wife') {
                scores.wife += pts;
                document.getElementById('w-score').innerText = scores.wife;
                document.body.style.backgroundColor = "var(--wife-color)";
            } else {
                scores.husband += pts;
                document.getElementById('h-score').innerText = scores.husband;
                document.body.style.backgroundColor = "var(--husband-color)";
            }
            document.getElementById('score-btns').style.display = 'none';
            document.getElementById('turn-label').innerText = "تم تسجيل النقطة ✅";
        }

        function startTimer() {
            let timeLeft = currentGame.timerDuration;
            document.getElementById('timer-btn').style.display = 'none';
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time-circle').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("انتهى الوقت! ⏱️");
                    document.getElementById('timer-btn').style.display = 'block';
                }
            }, 1000);
        }

        function resetTimer() { clearInterval(timerInterval); document.getElementById('timer-btn').style.display = 'block'; }

        function checkAuth() {
            const pass = prompt("كلمة السر:");
            if (pass === "3042023") {
                document.getElementById('auth-overlay').style.display = 'none';
                sessionStorage.setItem('isAuthorized', 'true');
            }
        }

        window.onload = () => { if (sessionStorage.getItem('isAuthorized') === 'true') document.getElementById('auth-overlay').style.display = 'none'; };
    </script>
</body>
</html>
