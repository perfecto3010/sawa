<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sawa | سوا ❤️</title>
    <style>
        :root { 
            --bg: #0f0f0f; 
            --wife-color: #ff4d6d; 
            --husband-color: #4361ee; 
            --accent-gold: #ffb703;
            --neutral-dark: #1a1a1a;
            --dos-gold: #ffc107;
            --dos-text: #541010;

            /* باليتة ألوان القائمة الاحترافية (Gradients) */
            --gradient-1: linear-gradient(135deg, #c9184a, #ff4d6d); /* لهاليبو */
            --gradient-2: linear-gradient(135deg, #7209b7, #b5179e); /* بوس أو دوس */
            --gradient-3: linear-gradient(135deg, #f72585, #ff758f); /* شوق أو دوق */
            --gradient-4: linear-gradient(135deg, #3f37c9, #4895ef); /* سلم الشوق */
            --gradient-5: linear-gradient(135deg, #fb5607, #ffbe0b); /* أوضاع */
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; background: var(--bg); 
            display: flex; flex-direction: column; 
            height: 100dvh; transition: background 0.6s ease; 
            overflow: hidden; touch-action: manipulation;
            color: white;
        }

        /* شاشة الدخول */
        #auth-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #121212; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }

        .screen { 
            display: none; flex-direction: column; align-items: center; 
            justify-content: space-between; height: 100%; width: 100vw; 
            padding: 20px; box-sizing: border-box; position: absolute; 
        }

        /* القائمة الرئيسية */
        #lobby { display: flex; overflow-y: auto; }
        .lobby-title { margin-bottom: 20px; font-size: 1.8rem; font-weight: bold; text-align: center; }

        .game-card { 
            width: 90%; max-width: 400px; padding: 25px; margin: 10px; 
            border-radius: 20px; color: white; font-size: 1.4rem; font-weight: bold; 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); transition: 0.3s;
            text-align: center; text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        .game-card:active { transform: scale(0.95); }

        /* تعيين ألوان الكروت بالترتيب */
        .card-0 { background: var(--gradient-1); }
        .card-1 { background: var(--gradient-2); }
        .card-2 { background: var(--gradient-3); }
        .card-3 { background: var(--gradient-4); }
        .card-4 { background: var(--gradient-5); }

        /* كارت عرض الأسئلة */
        #display-card { 
            background: white; padding: 30px; border-radius: 25px; 
            width: 85%; max-width: 360px; flex-grow: 1; 
            max-height: 40vh; margin: 20px 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 1.4rem; font-weight: bold; border: 6px solid #222; 
            text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.6); 
            line-height: 1.6; color: #222; overflow-y: auto;
        }

        #display-card.dos-mode { 
            background: linear-gradient(45deg, #ffc107, #ffeb3b); 
            border: 6px solid #ff9800; color: #541010; 
        }

        /* التحكم والأزرار */
        .header-area { width: 100%; display: flex; align-items: center; justify-content: space-between; }
        .exit-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.3); color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }

        #score-board { display: none; justify-content: center; gap: 15px; width: 100%; }
        .score-box { flex: 1; max-width: 110px; padding: 10px; border-radius: 15px; color: white; text-align: center; border: 2px solid rgba(255,255,255,0.5); }
        .score-val { font-size: 1.4rem; display: block; }

        .level-selection { display: none; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        .level-btn { padding: 18px; border-radius: 15px; border: none; color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .btn-group { display: none; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
        .action-btn { padding: 18px; border-radius: 15px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .main-btn { padding: 18px; border-radius: 50px; border: none; color: white; font-weight: bold; cursor: pointer; width: 100%; max-width: 280px; font-size: 1.2rem; }
        .next-btn { background: #f0f0f0; color: #111; padding: 15px 60px; border-radius: 30px; border: none; font-weight: bold; display: none; cursor: pointer; font-size: 1.1rem; }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h2 style="font-size: 2.5rem; margin-bottom: 30px;">Sawa | سوا ❤️</h2>
        <button onclick="checkAuth()" class="main-btn" style="background:var(--wife-color);">دخول اللعبة</button>
    </div>

    <div id="lobby" class="screen" style="display:flex;">
        <div class="lobby-title">اختر عالمنا الليلة ✨</div>
        <div id="game-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    </div>

    <div id="rules-screen" class="screen">
        <div style="flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%;">
            <div class="fade-in" style="background:white; padding:35px; border-radius:30px; text-align:center; width:85%; max-width:400px; color:#222;">
                <h2 id="rules-title" style="margin-top:0;"></h2>
                <p id="rules-text" style="font-size:1.1rem; margin:20px 0; line-height:1.7;"></p>
                <button id="confirm-rules-btn" class="main-btn" onclick="startActualGame()">ابدأ الآن 🚀</button>
                <div style="margin-top: 15px;"><button onclick="location.reload()" style="background:none; border:none; color:#999; text-decoration: underline; cursor:pointer;">تراجع</button></div>
            </div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="header-area">
            <div style="width: 40px;"></div>
            <div id="score-board">
                <div class="score-box" style="background:var(--wife-color)">الزوجة <span id="w-score" class="score-val">0</span></div>
                <div class="score-box" style="background:var(--husband-color)">الزوج <span id="h-score" class="score-val">0</span></div>
            </div>
            <button class="exit-btn" onclick="location.reload()">✕</button>
        </div>

        <div id="display-card" class="fade-in">استعد...</div>

        <div id="level-selection" class="level-selection fade-in">
            <button class="level-btn" style="background:#2ecc71" onclick="selectLevel('level1')">هادي (صراحة) 😊</button>
            <button class="level-btn" style="background:#f39c12" onclick="selectLevel('level2')">متوسط (جرأة) 😉</button>
            <button class="level-btn" style="background:#e74c3c" onclick="selectLevel('level3')">نار (لهاليبو) 🔥</button>
        </div>

        <div class="controls-area">
            <div id="challenge-group" class="btn-group">
                <p id="challenge-txt" style="text-align:center; font-weight:bold; margin-bottom:5px;">الدور على مين؟</p>
                <div style="display:flex; gap:10px;">
                    <button id="btn-wife" class="action-btn" style="background:var(--wife-color); flex:1;" onclick="applyCard('wife')">الزوجة 🌸</button>
                    <button id="btn-husband" class="action-btn" style="background:var(--husband-color); flex:1;" onclick="applyCard('husband')">الزوج 💙</button>
                </div>
            </div>

            <div id="scoring-group" class="btn-group">
                <button class="action-btn" style="background:#27ae60" onclick="confirmPoint(1)">نفذت بنجاح (+1) ✅</button>
                <button class="action-btn" style="background:#c0392b" onclick="confirmPoint(-2)">انسحبت (-2) ❌</button>
            </div>

            <button id="next-btn" class="next-btn fade-in" onclick="resetToChallenge()">التالي ⮕</button>
            <div id="progress" style="margin-top:10px; font-size:0.8rem; opacity:0.6;"></div>
        </div>
    </div>

    <script src="gamesData.js"></script>
    <script>
        let currentGame = null;
        let usedIndices = [];
        let scores = { wife: 0, husband: 0 };
        let activePlayer = null;
        let currentLevel = null;
        let nextTurn = 'wife';

        // 1. بناء القائمة الرئيسية بالألوان الجديدة
        const gameList = document.getElementById('game-list');
        if(typeof allGames !== 'undefined') {
            Object.values(allGames).forEach((game, index) => {
                const btn = document.createElement('button');
                btn.className = `game-card card-${index}`;
                btn.innerText = game.title;
                btn.onclick = () => {
                    currentGame = game;
                    document.getElementById('rules-title').innerText = game.title;
                    document.getElementById('rules-text').innerText = game.rules;
                    document.getElementById('confirm-rules-btn').className = `main-btn card-${index}`;
                    document.getElementById('lobby').style.display = 'none';
                    document.getElementById('rules-screen').style.display = 'flex';
                };
                gameList.appendChild(btn);
            });
        }

        // 2. إدارة الصلاحية
        function checkAuth() {
            if (prompt("كلمة السر:") === "3042023") {
                document.getElementById('auth-overlay').style.display = 'none';
                sessionStorage.setItem('isAuthorized', 'true');
            }
        }

        // 3. بدء اللعبة
        function startActualGame() {
            document.getElementById('rules-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            usedIndices = []; scores = { wife: 0, husband: 0 }; currentLevel = null;
            updateScoreUI(); resetToChallenge();
        }

        // 4. اختيار المستوى (للألعاب المتعددة مثل سلم الشوق)
        function selectLevel(lvl) {
            currentLevel = lvl;
            usedIndices = [];
            document.getElementById('level-selection').style.display = 'none';
            resetToChallenge();
        }

        // 5. إعادة ضبط الحالة لكل كارت
        function resetToChallenge() {
            document.getElementById('display-card').classList.remove('dos-mode');
            document.getElementById('scoring-group').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('level-selection').style.display = 'none';
            document.body.style.background = var(--bg);
            
            // تهيئة الزراير
            document.getElementById('btn-wife').innerText = "الزوجة 🌸";
            document.getElementById('btn-husband').innerText = "الزوج 💙";

            if (currentGame.isMultiLevel && !currentLevel) {
                document.getElementById('display-card').innerText = "اختر درجة حرارة الجلسة 🔥";
                document.getElementById('challenge-group').style.display = 'none';
                document.getElementById('level-selection').style.display = 'flex';
                return;
            }

            document.getElementById('challenge-group').style.display = 'flex';

            // منطق خاص بالألعاب
            if (currentGame.id === 'positions_game') {
                document.getElementById('score-board').style.display = 'none';
                document.getElementById('display-card').innerText = "جاهزين للتغيير؟ 🎲";
                document.getElementById('btn-wife').innerText = "اختار لنا وضع 🎲";
                document.getElementById('btn-husband').style.display = 'none';
            } else if (currentGame.id === 'heat_meter' || currentGame.id === 'shawk_aw_dawk') {
                document.getElementById('score-board').style.display = 'none';
                document.getElementById('btn-wife').style.display = (nextTurn === 'wife') ? 'block' : 'none';
                document.getElementById('btn-husband').style.display = (nextTurn === 'husband') ? 'block' : 'none';
                document.getElementById('display-card').innerText = (nextTurn === 'wife') ? "سؤال للزوجة.. 🌸" : "سؤال للزوج.. 💙";
            } else {
                document.getElementById('score-board').style.display = (currentGame.id === 'boss_dos') ? 'flex' : 'none';
                document.getElementById('display-card').innerText = "حجر ورقة مقص.. مين اللي كسب؟ ✌️";
                document.getElementById('btn-wife').style.display = 'block';
                document.getElementById('btn-husband').style.display = 'block';
            }
        }

        // 6. عرض الكارت
        function applyCard(player) {
            // سحب بنك الأسئلة الصحيح
            let pool = currentGame.isMultiLevel ? currentGame.levels[currentLevel] : (currentGame.questions || []);
            
            if (!pool || pool.length === 0) { alert("خطأ في تحميل الكروت!"); return; }
            if (usedIndices.length >= pool.length) { 
                alert("انتهت جميع الكروت!"); 
                currentLevel = null; resetToChallenge(); return; 
            }

            let idx;
            do { idx = Math.floor(Math.random() * pool.length); } while (usedIndices.includes(idx));
            usedIndices.push(idx);
            
            activePlayer = player;
            document.getElementById('display-card').innerText = pool[idx];
            document.body.style.background = player === 'wife' ? "var(--wife-color)" : "var(--husband-color)";
            document.getElementById('challenge-group').style.display = 'none';

            if (currentGame.hasScore) {
                document.getElementById('scoring-group').style.display = 'flex';
            } else {
                document.getElementById('next-btn').style.display = 'block';
            }

            // تحديث الدور للألعاب التبادلية
            if (currentGame.id === 'heat_meter' || currentGame.id === 'shawk_aw_dawk') {
                nextTurn = (player === 'wife') ? 'husband' : 'wife';
            }

            document.getElementById('progress').innerText = `كارت ${usedIndices.length} / ${pool.length}`;
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function confirmPoint(pts) { 
            scores[activePlayer] += pts; 
            updateScoreUI(); 
            resetToChallenge(); 
        }

        function updateScoreUI() {
            document.getElementById('w-score').innerText = scores.wife;
            document.getElementById('h-score').innerText = scores.husband;
        }

        window.onload = () => { 
            if(sessionStorage.getItem('isAuthorized') === 'true') 
                document.getElementById('auth-overlay').style.display = 'none'; 
        };
    </script>
</body>
</html>
