<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sawa | سوا</title>
    <style>
        :root { 
            --bg: #f8f9fa; 
            --wife-color: #ff85a2;
            --husband-color: #4a90e2;
            --neutral-dark: #2c3e50;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; transition: 0.5s; overflow: hidden; }
        
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }

        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; padding: 20px; box-sizing: border-box; position: absolute; }
        #lobby { display: flex; }

        .game-card { width: 90%; max-width: 400px; padding: 25px; margin: 10px; border-radius: 20px; color: white; font-size: 1.5rem; font-weight: bold; cursor: pointer; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.2s; }
        .game-card:active { transform: scale(0.95); }

        #score-board { display: none; justify-content: center; gap: 15px; margin-bottom: 20px; width: 100%; }
        .score-box { flex: 1; max-width: 120px; padding: 10px; border-radius: 15px; color: white; font-weight: bold; text-align: center; border: 2px solid #fff; }
        .score-val { font-size: 1.5rem; display: block; }

        #display-card { background: white; padding: 35px 25px; border-radius: 25px; width: 85%; max-width: 350px; min-height: 200px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; border: 8px solid #333; margin-bottom: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); line-height: 1.5; }

        .btn-group { display: none; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; }
        .action-btn { padding: 18px; border-radius: 15px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        .main-btn { padding: 18px 60px; font-size: 1.3rem; border-radius: 50px; border: none; color: white; cursor: pointer; font-weight: bold; width: 100%; max-width: 250px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h2 style="font-size: 2.5rem; margin-bottom: 30px;">Sawa | سوا ❤️</h2>
        <button onclick="checkAuth()" style="padding: 15px 50px; border-radius: 30px; border: none; background: var(--wife-color); color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer;">دخول</button>
    </div>

    <div id="lobby" class="screen">
        <h1 style="margin-bottom: 10px;">اختر عالمنا الليلة</h1>
        <p style="color: #666; margin-bottom: 30px;">جاهز للسهرة؟</p>
        <div id="game-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    </div>

    <div id="rules-screen" class="screen">
        <div style="background:white; padding:40px 25px; border-radius:30px; text-align:center; width:85%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.2);">
            <h2 id="rules-title" style="font-size: 2rem; margin-top: 0;"></h2>
            <div id="rules-text" style="font-size: 1.2rem; line-height: 1.8; color: #444; margin: 25px 0;"></div>
            <button class="main-btn" id="confirm-rules-btn" onclick="startActualGame()">جاهزين.. نبدأ! 🚀</button>
            <div style="margin-top: 20px;"><a href="#" onclick="location.reload()" style="color: #888; text-decoration: none;">رجوع</a></div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="score-board">
            <div class="score-box" style="background:var(--wife-color)">الزوجة <span id="w-score" class="score-val">0</span></div>
            <div class="score-box" style="background:var(--husband-color)">الزوج <span id="h-score" class="score-val">0</span></div>
        </div>

        <div id="display-card" class="fade-in">اسحب أول كارت</div>

        <div id="who-laughed-group" class="btn-group">
            <p style="color:white; text-align:center; font-weight: bold; margin-bottom: 10px;">مين اللي ضحك الأول؟ 👀</p>
            <button class="action-btn" style="background:var(--wife-color)" onclick="prepareQuestion('wife')">الزوجة</button>
            <button class="action-btn" style="background:var(--husband-color)" onclick="prepareQuestion('husband')">الزوج</button>
        </div>

        <div id="answer-group" class="btn-group">
            <button class="action-btn" style="background:#4caf50" onclick="confirmPoint(1)">جاوبت صح (+1) ✅</button>
            <button class="action-btn" style="background:#f44336" onclick="confirmPoint(-2)">انسحبت (-2) ❌</button>
        </div>

        <button class="main-btn" id="draw-btn" onclick="drawCard()">سحب كارت</button>
        
        <button onclick="location.reload()" style="background:none; border:1px solid rgba(255,255,255,0.6); color:white; margin-top:30px; padding:8px 20px; border-radius:12px; font-size: 0.9rem;">إنهاء اللعبة 🔄</button>
        <div id="progress" style="margin-top: 15px; color: white; font-weight: bold; font-size: 0.8rem;"></div>
    </div>

    <script src="gamesData.js"></script>
    <script>
        let currentGame = null;
        let usedIndices = [];
        let scores = { wife: 0, husband: 0 };
        let activePlayer = null;
        let pendingQuestion = "";

        // توليد الألعاب في القائمة
        const gameList = document.getElementById('game-list');
        Object.values(allGames).forEach(game => {
            const btn = document.createElement('button');
            btn.className = 'game-card';
            btn.style.backgroundColor = game.accent;
            btn.innerText = game.title;
            btn.onclick = () => {
                currentGame = game;
                document.body.style.backgroundColor = game.color;
                document.getElementById('rules-title').innerText = game.title;
                document.getElementById('rules-text').innerText = game.rules;
                document.getElementById('confirm-rules-btn').style.backgroundColor = game.accent;
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('rules-screen').style.display = 'flex';
            };
            gameList.appendChild(btn);
        });

        function startActualGame() {
            document.getElementById('rules-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('score-board').style.display = currentGame.hasScore ? 'flex' : 'none';
            document.getElementById('draw-btn').style.display = 'block';
            document.getElementById('draw-btn').style.backgroundColor = currentGame.accent;
            document.getElementById('display-card').style.borderColor = currentGame.accent;
            usedIndices = [];
            scores = { wife: 0, husband: 0 };
            updateScoreUI();
        }

        function drawCard() {
            if (usedIndices.length === currentGame.questions.length) {
                alert("انتهت جميع الكروت!"); location.reload(); return;
            }

            let idx;
            do { idx = Math.floor(Math.random() * currentGame.questions.length); } while (usedIndices.includes(idx));
            usedIndices.push(idx);
            pendingQuestion = currentGame.questions[idx];

            if (currentGame.hasScore) {
                // وضع التحدي (لهاليبو)
                document.getElementById('display-card').innerText = "👀 تحدي نظرات.. ركزوا!";
                document.body.style.backgroundColor = "var(--neutral-dark)";
                document.getElementById('who-laughed-group').style.display = 'flex';
                document.getElementById('answer-group').style.display = 'none';
                document.getElementById('draw-btn').style.display = 'none';
            } else {
                // الوضع العادي
                document.getElementById('display-card').innerText = pendingQuestion;
                document.body.style.backgroundColor = (usedIndices.length % 2 === 0) ? "var(--wife-color)" : "var(--husband-color)";
            }
            document.getElementById('progress').innerText = `كارت ${usedIndices.length} من ${currentGame.questions.length}`;
        }

        function prepareQuestion(player) {
            activePlayer = player;
            document.getElementById('display-card').innerText = pendingQuestion;
            document.body.style.backgroundColor = player === 'wife' ? "var(--wife-color)" : "var(--husband-color)";
            document.getElementById('who-laughed-group').style.display = 'none';
            document.getElementById('answer-group').style.display = 'flex';
        }

        function confirmPoint(pts) {
            if (activePlayer === 'wife') scores.wife += pts;
            else scores.husband += pts;
            
            updateScoreUI();
            document.getElementById('display-card').innerText = "تم تسجيل النتيجة ✅ اسحب الكارت التالي";
            document.getElementById('answer-group').style.display = 'none';
            document.getElementById('draw-btn').style.display = 'block';
            document.body.style.backgroundColor = currentGame.color;
        }

        function updateScoreUI() {
            document.getElementById('w-score').innerText = scores.wife;
            document.getElementById('h-score').innerText = scores.husband;
        }

        function checkAuth() {
            if (prompt("من فضلك أدخل كلمة السر:") === "3042023") {
                document.getElementById('auth-overlay').style.display = 'none';
                sessionStorage.setItem('isAuthorized', 'true');
            }
        }
        window.onload = () => { if(sessionStorage.getItem('isAuthorized') === 'true') document.getElementById('auth-overlay').style.display = 'none'; };
    </script>
</body>
</html>
